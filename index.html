<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>

    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <header>
        <nav>
            <h1 class="logo">
                <i class="fa-solid fa-cloud-sun"></i>
                Tableau de Bord Météo
        </h1>
            <ul>
                <li class="active">Tableau de bord</li>
                <li>Prévisions</li>
                <li>Carte</li>
                <li>Alertes</li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="search-container">
            <form id="weatherForm">

                <input
                    type="text"
                    id="cityInput"
                    placeholder="Entrez une ville"
                    aria-describedby="errorMessage">

                <button type="submit">
                    Rechercher
                </button>

            </form>

            <p id="errorMessage"></p>

        </section>

        <div id="loader" class="loader hidden">
            Chargement...
        </div>

        <div id="apiMessage"></div>

        <section id="weatherCard" class="weather-card hidden">

    <h2 id="cityName">Ville</h2>

    <p class="subtitle">
        météo actuelle
    </p>

    <div id="weatherIcon" class="weather-icon">
        ☀️
    </div>

    <h2 id="temperature">-- °C</h2>

    <hr>

    <div class="details">
    </div>

        <div>
            <i class="fa-solid fa-cloud-sun"></i>

            <h2 id="weatherStatus">
                Condition inconnue
            </h2>
            <p>Condition</p>
        </div>
        <div>
            <i class="fa-solid fa-wind"></i>

            <h2 id="windSpeed">
                -- km/h
            </h2>
            <p>Vitesse du vent</p>
 <p class="update-time">
                Mis à jour à l'instant
            </p>
        </div>

</section>  
    </main>

    <footer>
        LOG3500 - Applications Web Asynchrones & API
    </footer>

    <script src="app.js"></script>

</body>
</html>
